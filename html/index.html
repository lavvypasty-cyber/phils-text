<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Speech Bubble</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: transparent;
            pointer-events: none;
        }

        #bubble-wrapper {
            position: absolute;
            bottom: 52%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #bubble-wrapper.visible {
            opacity: 1;
        }

        #bubble-box {
            background: rgba(255, 245, 220, 0.96);
            border: 2px solid #7a5c2e;
            border-radius: 14px;
            padding: 10px 16px;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 4px 18px rgba(0,0,0,0.55);
            position: relative;
        }

        #bubble-text {
            font-family: 'Georgia', serif;
            font-size: 15px;
            color: #2e1a00;
            line-height: 1.5;
            word-break: break-word;
        }

        #bubble-box::after {
            content: '';
            position: absolute;
            bottom: -14px; left: 50%;
            transform: translateX(-50%);
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 14px solid #7a5c2e;
        }

        #bubble-box::before {
            content: '';
            position: absolute;
            bottom: -11px; left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 12px solid rgba(255, 245, 220, 0.96);
            z-index: 1;
        }
    </style>
</head>
<body>
    <div id="bubble-wrapper">
        <div id="bubble-box">
            <span id="bubble-text"></span>
        </div>
    </div>

    <script>
        const wrapper    = document.getElementById('bubble-wrapper');
        const bubbleText = document.getElementById('bubble-text');

        window.addEventListener('message', function(event) {
            const data = event.data;
            if (data.action === 'showBubble') {
                bubbleText.textContent = data.message;
                wrapper.classList.add('visible');
            } else if (data.action === 'hideBubble') {
                wrapper.classList.remove('visible');
            }
        });
    </script>
</body>
</html>
